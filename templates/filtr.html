<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фильтр объектов</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px;
        }

        .header h1 {
            font-size: 2.5rem;
            color: #2c3e50;
            margin-bottom: 10px;
            font-weight: 700;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.1);
        }

        .header p {
            font-size: 1.1rem;
            color: #7f8c8d;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }

        .filter-card {
            background-color: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 40px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .filter-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
        }

        .form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #2c3e50;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-group label i {
            color: #3498db;
            width: 20px;
        }

        .form-control {
            padding: 14px 16px;
            border: 2px solid #e1e8ed;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background-color: #f8fafc;
            color: #333;
        }

        .form-control:focus {
            outline: none;
            border-color: #3498db;
            background-color: white;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
        }

        .form-control::placeholder {
            color: #95a5a6;
        }

        select.form-control {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%233498db' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 16px center;
            background-size: 16px;
            padding-right: 40px;
        }

        .button-group {
            grid-column: 1 / -1;
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #ecf0f1;
        }

        .btn {
            padding: 14px 32px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            min-width: 180px;
        }

        .btn-primary {
            background: linear-gradient(to right, #3498db, #2ecc71);
            color: white;
        }

        .btn-primary:hover {
            background: linear-gradient(to right, #2980b9, #27ae60);
            transform: translateY(-2px);
            box-shadow: 0 7px 15px rgba(52, 152, 219, 0.3);
        }

        .btn-secondary {
            background-color: #ecf0f1;
            color: #7f8c8d;
        }

        .btn-secondary:hover {
            background-color: #dfe6e9;
            color: #2c3e50;
            transform: translateY(-2px);
            box-shadow: 0 7px 15px rgba(189, 195, 199, 0.3);
        }

        .btn i {
            font-size: 1.1rem;
        }

        .input-icon {
            position: relative;
        }

        .input-icon input {
            padding-left: 45px;
        }

        .input-icon i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #95a5a6;
            font-size: 1.1rem;
        }

        .price-range {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .price-range .form-control {
            flex: 1;
        }

        .currency {
            color: #3498db;
            font-weight: 600;
            white-space: nowrap;
        }

        @media (max-width: 768px) {
            .form {
                grid-template-columns: 1fr;
            }
            
            .filter-card {
                padding: 25px;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .button-group {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            .filter-card {
                padding: 20px;
            }
            
            .header h1 {
                font-size: 1.8rem;
            }
            
            .header p {
                font-size: 1rem;
            }
            
            .form-control {
                padding: 12px 14px;
            }
        }

        .filter-badge {
            display: inline-block;
            background: linear-gradient(to right, #ff7e5f, #feb47b);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-top: 10px;
            box-shadow: 0 3px 8px rgba(255, 126, 95, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-filter"></i> Фильтр объектов</h1>
            <p>Используйте фильтры ниже для поиска объектов по различным параметрам. Все поля являются необязательными.</p>
            <div class="filter-badge">Найдено объектов: {{ object_count if object_count else 0 }}</div>
        </div>
        
        <div class="filter-card">
            <form action="/getbyfiltr/" method="post" class="form">
                <!-- Название объекта -->
                <div class="form-group">
                    <label for="name"><i class="fas fa-heading"></i> Название объекта</label>
                    <div class="input-icon">
                        <i class="fas fa-search"></i>
                        <input type="text" name="name" id="name" class="form-control" placeholder="Введите название объекта...">
                    </div>
                </div>
                
                <!-- Описание -->
                <div class="form-group">
                    <label for="description"><i class="fas fa-file-alt"></i> Описание</label>
                    <div class="input-icon">
                        <i class="fas fa-align-left"></i>
                        <input type="text" name="description" id="description" class="form-control" placeholder="Введите описание или ключевые слова...">
                    </div>
                </div>
                
                <!-- Сотрудник -->
                <div class="form-group">
                    <label for="employe"><i class="fas fa-user-tie"></i> Ответственный сотрудник</label>
                    <select name="employe" id="employe" class="form-control">
                        <option value="">Все сотрудники</option>
                        {% if employees %}
                            {% for employe in employees %}
                                <option value="{{ employe[0] }}">{{ employe[1] }}</option>
                            {% endfor %}
                        {% endif %}
                    </select>
                </div>
                
                <!-- Тип объекта -->
                <div class="form-group">
                    <label for="type"><i class="fas fa-tags"></i> Тип объекта</label>
                    <select name="type" id="type" class="form-control">
                        <option value="">Все типы</option>
                        {% if type_object %}
                            {% for type in type_object %}
                                <option value="{{ type[0] }}">{{ type[1] }}</option>
                            {% endfor %}
                        {% endif %}
                    </select>
                </div>
                
                <!-- Цена -->
                <div class="form-group">
                    <label for="price"><i class="fas fa-tag"></i> Максимальная цена</label>
                    <div class="price-range">
                        <div class="input-icon">
                            <i class="fas fa-dollar-sign"></i>
                            <input type="number" name="price" id="price" class="form-control" min="0" step="0.01" placeholder="0.00">
                        </div>
                        <div class="currency">руб.</div>
                    </div>
                </div>
                
                <!-- Дополнительные фильтры (раскомментируйте если нужно) -->
                <!--
                <div class="form-group">
                    <label for="date"><i class="fas fa-calendar-alt"></i> Дата создания</label>
                    <input type="date" name="date" id="date" class="form-control">
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-sliders-h"></i> Статус объекта</label>
                    <div style="display: flex; gap: 15px; margin-top: 5px;">
                        <label style="font-weight: normal; display: flex; align-items: center; gap: 5px;">
                            <input type="checkbox" name="status[]" value="active"> Активный
                        </label>
                        <label style="font-weight: normal; display: flex; align-items: center; gap: 5px;">
                            <input type="checkbox" name="status[]" value="pending"> В обработке
                        </label>
                    </div>
                </div>
                -->
                
                <!-- Кнопки -->
                <div class="button-group">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-filter"></i> Применить фильтр
                    </button>
                    <button type="reset" class="btn btn-secondary">
                        <i class="fas fa-redo"></i> Сбросить форму
                    </button>
                </div>
                
               
            </form>
        </div>
        
        <!-- Подсказка -->
        <div style="text-align: center; margin-top: 30px; color: #7f8c8d; font-size: 0.9rem;">
            <p><i class="fas fa-info-circle"></i> Оставьте поля пустыми, если не хотите применять определенный фильтр</p>
        </div>
    </div>

    <!-- Небольшой JavaScript для улучшения UX -->
    <script>
        // Добавление класса при фокусе на поле ввода
        document.addEventListener('DOMContentLoaded', function() {
            const formControls = document.querySelectorAll('.form-control');
            
            formControls.forEach(control => {
                // Добавляем эффект при фокусе
                control.addEventListener('focus', function() {
                    this.parentElement.style.transform = 'scale(1.02)';
                });
                
                control.addEventListener('blur', function() {
                    this.parentElement.style.transform = 'scale(1)';
                });
                
                // Подсветка заполненных полей
                control.addEventListener('input', function() {
                    if (this.value.trim() !== '') {
                        this.style.backgroundColor = '#f0f9ff';
                    } else {
                        this.style.backgroundColor = '#f8fafc';
                    }
                });
            });
            
            // Анимация кнопок
            const buttons = document.querySelectorAll('.btn');
            buttons.forEach(button => {
                button.addEventListener('mousedown', function() {
                    this.style.transform = 'scale(0.98)';
                });
                
                button.addEventListener('mouseup', function() {
                    this.style.transform = 'scale(1)';
                });
                
                button.addEventListener('mouseleave', function() {
                    this.style.transform = 'scale(1)';
                });
            });
            
            // Подсказка для поля цены
            const priceInput = document.getElementById('price');
            if (priceInput) {
                priceInput.addEventListener('input', function() {
                    const value = parseFloat(this.value);
                    if (value > 1000000) {
                        this.style.borderColor = '#e74c3c';
                        this.style.boxShadow = '0 0 0 3px rgba(231, 76, 60, 0.2)';
                    } else {
                        this.style.borderColor = '#3498db';
                        this.style.boxShadow = '0 0 0 3px rgba(52, 152, 219, 0.2)';
                    }
                });
            }
        });
    </script>
</body>
</html>
