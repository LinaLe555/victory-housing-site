<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Земельные участки | Жилье победы</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #1b4d3d 0%, #0f3b2c 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '🌳🌲🌿';
            position: fixed;
            bottom: 20px;
            left: 20px;
            font-size: 120px;
            opacity: 0.1;
            white-space: nowrap;
            transform: rotate(-15deg);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(45deg, transparent, transparent 50px, rgba(255,255,255,0.02) 50px, rgba(255,255,255,0.02) 100px);
            pointer-events: none;
        }

        .main {
            display: grid;
            grid-template-rows: auto 1fr auto;
            grid-template-columns: 300px 1fr;
            min-height: calc(100vh - 40px);
            max-width: 1600px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 30px 60px -20px rgba(0, 0, 0, 0.6), 0 0 0 2px rgba(120, 180, 120, 0.2) inset;
            transition: all 0.3s ease;
            position: relative;
            z-index: 1;
        }

        .item {
            transition: all 0.3s ease;
        }

        /* Левая навигация - единый компактный стиль */
.nav {
    grid-row: span 2;
    background: linear-gradient(165deg, #1e293b 0%, #0f172a 100%);
    color: #fff;
    padding: 15px 12px;
    border: none;
    position: relative;
    overflow: hidden;
    box-shadow: 4px 0 25px rgba(0, 0, 0, 0.2);
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.nav::before {
    content: '🏢🏬🏭';
    position: absolute;
    bottom: -20px;
    right: -30px;
    font-size: 200px;
    opacity: 0.05;
    transform: rotate(15deg);
    white-space: nowrap;
    line-height: 1;
    pointer-events: none;
}

.nav::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, #3498db, #9b59b6);
    animation: borderFlow 3s linear infinite;
}

@keyframes borderFlow {
    0% { background-position: 0% 50%; }
    100% { background-position: 200% 50%; }
}

.search {
    background: rgba(255, 255, 255, 0.08);
    border: 2px solid rgba(52, 152, 219, 0.3);
    color: #fff;
    border-radius: 16px;
    padding: 8px 15px;
    font-size: 14px;
    backdrop-filter: blur(8px);
    transition: all 0.3s ease;
    margin-bottom: 0;
    height: 40px;
}

.search:focus {
    background: rgba(255, 255, 255, 0.12);
    border-color: #3498db;
    box-shadow: 0 0 25px rgba(52, 152, 219, 0.3);
    color: #fff;
    transform: translateY(-1px);
}

.search::placeholder {
    color: rgba(255, 255, 255, 0.5);
    font-size: 14px;
}

.filtr {
    margin: 0;
}

.filtr a {
    color: #fff;
    text-decoration: none;
    font-size: 15px;
    font-weight: 600;
    padding: 8px 18px;
    background: linear-gradient(135deg, #3498db, #9b59b6);
    border-radius: 30px;
    display: block;
    transition: all 0.3s ease;
    box-shadow: 0 6px 15px rgba(0, 0, 0, 0.3);
    letter-spacing: 0.3px;
    text-align: center;
    border: 1px solid rgba(255, 255, 255, 0.2);
}

.filtr a:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 25px rgba(52, 152, 219, 0.4);
    background: linear-gradient(135deg, #3b9bdb, #a85fc0);
}

.filtr i {
    margin-right: 8px;
}

.day {
    display: flex;
    gap: 8px;
    margin: 0;
}

.day p {
    flex: 1;
    padding: 5px 0;
    border-radius: 30px;
    cursor: pointer;
    transition: all 0.3s ease;
    font-weight: 600;
    text-align: center;
    font-size: 13px;
    backdrop-filter: blur(5px);
    border: 1px solid rgba(255, 255, 255, 0.1);
}

.day p:first-child {
    background: linear-gradient(135deg, #3498db, #2980b9);
    color: #fff;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
}

.day p:last-child {
    background: rgba(255, 255, 255, 0.05);
    color: #ecf0f1;
}

.day p:last-child:hover {
    background: rgba(52, 152, 219, 0.2);
    border-color: #3498db;
    transform: scale(1.02);
}

.day i {
    margin-right: 5px;
}

.object {
    margin: 0;
}

.object p {
    margin: 4px 0;
}

.object a {
    color: #bdc3c7;
    text-decoration: none;
    font-size: 14px;
    padding: 6px 12px;
    border-radius: 12px;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid transparent;
}

.object a:hover {
    background: rgba(52, 152, 219, 0.1);
    border-color: rgba(52, 152, 219, 0.3);
    transform: translateX(6px);
    color: #fff;
}

.object i {
    font-size: 18px;
    width: 24px;
    color: #3498db;
    filter: drop-shadow(0 2px 3px rgba(0,0,0,0.2));
}

        /* Хедер - небо и земля */
        .header {
            background: linear-gradient(145deg, #8bc34a 0%, #5a8f4c 100%);
            border: none;
            padding: 35px 50px;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '☀️⛅🌤️';
            position: absolute;
            top: 10px;
            right: 30px;
            font-size: 90px;
            opacity: 0.25;
            transform: rotate(5deg);
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 40px;
            background: linear-gradient(to top, #3d6b3d, transparent);
            opacity: 0.3;
        }

        .live {
            font-size: 52px;
            font-weight: 900;
            color: #fff;
            text-shadow: 4px 4px 0 #2e7d32, 6px 6px 0 rgba(0, 0, 0, 0.1);
            margin: 0 0 5px;
            letter-spacing: 2px;
            position: relative;
            z-index: 1;
            display: inline-block;
            transform: rotate(-1deg);
        }

        .header h2 {
            color: #fff9e6;
            font-size: 32px;
            margin: 10px 0 0;
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            gap: 15px;
            text-shadow: 2px 2px 3px rgba(0,0,0,0.2);
        }

        .header h2::before {
            content: '🌳';
            font-size: 45px;
            filter: drop-shadow(2px 4px 4px rgba(0,0,0,0.2));
            animation: swing 3s ease-in-out infinite;
        }

        .header h2::after {
            content: 'Земля для вашего будущего';
            font-size: 18px;
            background: rgba(255, 255, 255, 0.2);
            padding: 5px 20px;
            border-radius: 40px;
            margin-left: 15px;
            font-weight: 400;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        @keyframes swing {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(5deg); }
        }

        /* Каталог участков */
        .catalog {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 35px;
            padding: 50px;
            background: #f5f9f0;
            background-image: radial-gradient(circle at 20% 30%, rgba(160, 220, 150, 0.1) 0%, transparent 30%);
        }

        .catalog > div {
            background: white;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(60, 90, 50, 0.15);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            cursor: pointer;
            border: 1px solid rgba(120, 180, 120, 0.3);
            backdrop-filter: blur(5px);
        }

        .catalog > div:hover {
            transform: translateY(-20px) scale(1.02);
            box-shadow: 0 35px 50px -15px #2e7d32;
            border-color: #7cb342;
        }

        .catalog > div::before {
            content: '🌿';
            position: absolute;
            top: -20px;
            right: -20px;
            font-size: 80px;
            opacity: 0;
            transform: rotate(25deg) scale(0.5);
            transition: all 0.4s ease;
            z-index: 2;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
            pointer-events: none;
        }

        .catalog > div:hover::before {
            opacity: 0.2;
            transform: rotate(10deg) scale(1);
            top: -10px;
            right: -10px;
        }

        .catalog > div::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, #7cb342, #a5d6a7, #7cb342);
            transform: scaleX(0);
            transition: transform 0.4s ease;
        }

        .catalog > div:hover::after {
            transform: scaleX(1);
        }

        .catalog img {
            width: 100%;
            height: 260px;
            object-fit: cover;
            transition: all 0.6s ease;
            border-bottom: 4px solid transparent;
        }

        .catalog > div:hover img {
            transform: scale(1.1);
            border-bottom-color: #7cb342;
        }

        .catalog h2 {
            font-size: 26px;
            font-weight: 800;
            margin: 25px 25px 15px;
            color: #1b4d3d;
            position: relative;
            padding-bottom: 12px;
            line-height: 1.2;
        }

        .catalog h2::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 70px;
            height: 4px;
            background: linear-gradient(90deg, #7cb342, #a5d6a7);
            border-radius: 4px;
            transition: width 0.4s ease;
        }

        .catalog > div:hover h2::after {
            width: 120px;
        }

        .price {
            padding: 0 25px 30px;
            font-size: 34px;
            font-weight: 900;
            color: #2e7d32;
            display: flex;
            align-items: baseline;
            gap: 5px;
            flex-wrap: wrap;
        }

        .price::before {
            content: '₽';
            font-size: 26px;
            color: #5d8c5d;
            font-weight: 500;
            margin-right: 5px;
        }

        .price::after {
            content: 'сотка/мес';
            font-size: 16px;
            color: #8fbc8f;
            margin-left: 10px;
            font-weight: 400;
            background: rgba(120, 180, 120, 0.1);
            padding: 3px 12px;
            border-radius: 40px;
            letter-spacing: 0.5px;
        }

        /* Футер */
        .footer {
            grid-column: span 2;
            background: linear-gradient(145deg, #1d4e2d 0%, #123d20 100%);
            border: none;
            padding: 25px 50px;
            position: relative;
            overflow: hidden;
        }

        .footer::before {
            content: '🌾🌻🌱';
            position: absolute;
            bottom: -20px;
            left: 20px;
            font-size: 100px;
            opacity: 0.15;
            white-space: nowrap;
            transform: rotate(-5deg);
        }

        .svyaz {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #e6f0d8;
            position: relative;
            z-index: 1;
        }

        .svyaz p {
            margin: 0;
            font-size: 19px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s ease;
            padding: 10px 30px;
            border-radius: 60px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(160, 220, 150, 0.3);
            backdrop-filter: blur(5px);
        }

        .svyaz p:hover {
            background: rgba(160, 220, 150, 0.2);
            color: #fff;
            transform: translateY(-3px);
            border-color: #a0dc96;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .svyaz i {
            font-size: 22px;
            color: #a0dc96;
            filter: drop-shadow(0 2px 3px rgba(0,0,0,0.2));
        }

        /* Адаптивность */
        @media (max-width: 1200px) {
            .main {
                grid-template-columns: 260px 1fr;
            }
            
            .catalog {
                grid-template-columns: repeat(2, 1fr);
                padding: 40px;
                gap: 30px;
            }
            
            .live {
                font-size: 44px;
            }
            
            .header h2::after {
                display: none;
            }
        }

        @media (max-width: 992px) {
            .main {
                grid-template-columns: 1fr;
                grid-template-rows: auto auto 1fr auto;
            }
            
            .nav {
                grid-row: auto;
            }
            
            .footer {
                grid-column: auto;
            }
            
            .catalog {
                grid-template-columns: 1fr;
                padding: 35px;
            }
            
            .header {
                padding: 30px;
            }
            
            .live {
                font-size: 40px;
            }
            
            .header h2 {
                font-size: 28px;
                flex-wrap: wrap;
            }
            
            .svyaz {
                flex-direction: column;
                gap: 20px;
                align-items: stretch;
            }
            
            .svyaz p {
                justify-content: center;
            }
        }

        @media (max-width: 576px) {
            body {
                padding: 10px;
            }
            
            .main {
                border-radius: 25px;
            }
            
            .catalog {
                padding: 25px;
                gap: 25px;
            }
            
            .catalog > div {
                border-radius: 20px;
            }
            
            .price {
                font-size: 28px;
                flex-wrap: wrap;
            }
            
            .price::after {
                margin-left: 0;
                width: 100%;
            }
        }

        /* Анимация для карточек */
        @keyframes floatIn {
            0% {
                opacity: 0;
                transform: translateY(40px) scale(0.9);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .catalog > div {
            animation: floatIn 0.7s ease-out forwards;
        }

        .catalog > div:nth-child(2) { animation-delay: 0.1s; }
        .catalog > div:nth-child(3) { animation-delay: 0.2s; }
        .catalog > div:nth-child(4) { animation-delay: 0.3s; }
        .catalog > div:nth-child(5) { animation-delay: 0.4s; }
        .catalog > div:nth-child(6) { animation-delay: 0.5s; }
        .catalog > div:nth-child(7) { animation-delay: 0.6s; }
        .catalog > div:nth-child(8) { animation-delay: 0.7s; }

        /* Кастомный скроллбар */
        ::-webkit-scrollbar {
            width: 12px;
        }

        ::-webkit-scrollbar-track {
            background: #e6f0d8;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #7cb342, #558b2f);
            border-radius: 10px;
            border: 2px solid #e6f0d8;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #8bc34a, #7cb342);
        }
    </style>
</head>
<body>
    <div class="main">
        <!-- Левая навигация (исправлены отступы, добавлена форма поиска) -->
        <div class="item nav">
            <form method="GET" action="/plottype/" class="search-form">
                <input class="form-control search" list="datalistOptions" id="exampleDataList" name="search" placeholder="🌳 Поиск участков...">
                <datalist id="datalistOptions">
                    <option value="Участки ИЖС">
                    <option value="СНТ участки">
                    <option value="Коммерческие участки">
                    <option value="Под строительство">
                    <option value="Сельхоз земли">
                    <option value="Лесные участки">
                </datalist>
            </form>
            
            <div class="filtr">
                <a href="/filtr/"><i class="bi bi-funnel"></i> Фильтр участков</a>
            </div>
            
            <div class="day">
                <p><i class="bi bi-calendar-check"></i> В месяц</p>
                <p><i class="bi bi-calendar-week"></i> В день</p>
            </div>
            
            <div class="object">
                <p><a href="/"><i class="bi bi-house-door"></i> Главная</a></p>
                <p><a href="/hometype/"><i class="bi bi-building"></i> Дома</a></p>
                <p><a href="/garagestype/"><i class="bi bi-car-front"></i> Гаражи</a></p>
                <p><a href="/apartamenttype/"><i class="bi bi-building"></i> Квартиры</a></p>
                <p><a href="/plottype/"><i class="bi bi-tree"></i> Участки</a></p>
                <p><a href="/othertype/"><i class="bi bi-grid-3x3-gap-fill"></i> Прочее</a></p>
            </div>
        </div>

        <!-- Хедер -->
        <div class="item header">
            <h1 class="live">Жилье победы</h1>
            <h2>Земельные участки</h2>
        </div>

        <!-- Каталог участков -->
        <div class="catalog">
            {% for obj in objects %}
            <div>
                <img src="https://avatars.mds.yandex.net/i?id=925e856a5f5273ed0c22259d8d130e37d2763549-12752873-images-thumbs&n=13" alt="Земельный участок">
                <h2>{{ obj[1] }}</h2>
                <div class="price">{{ obj[4] }}</div>
            </div>
            {% endfor %}
        </div>

        <!-- Футер -->
        <div class="item footer">
            <div class="svyaz">
                <p><i class="bi bi-telephone"></i> 8 (977) 787-77-77</p>
                <p><i class="bi bi-envelope"></i> zemlya.victory@mail.ru</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
