<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Квартиры | Жилье победы</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #1a2639 0%, #0f172a 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '🏙️🌆🌃🏢';
            position: fixed;
            bottom: 30px;
            right: 30px;
            font-size: 200px;
            opacity: 0.03;
            transform: rotate(-5deg);
            pointer-events: none;
            z-index: 0;
            white-space: nowrap;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 100vh;
            background: repeating-linear-gradient(90deg, transparent, transparent 50px, rgba(255,255,255,0.01) 50px, rgba(255,255,255,0.01) 100px);
            pointer-events: none;
        }

        .main {
            display: grid;
            grid-template-rows: auto 1fr auto;
            grid-template-columns: 300px 1fr;
            min-height: calc(100vh - 40px);
            max-width: 1600px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 30px 60px -20px rgba(0, 0, 0, 0.6), 0 0 0 2px rgba(52, 152, 219, 0.3) inset;
            transition: all 0.3s ease;
            position: relative;
            z-index: 1;
        }

        .item {
            transition: all 0.3s ease;
        }

        /* Левая навигация - современный урбанистический стиль */
        .nav {
            grid-row: span 2;
            background: linear-gradient(165deg, #1e293b 0%, #0f172a 100%);
            color: #fff;
            padding: 35px 25px;
            border: none;
            position: relative;
            overflow: hidden;
            box-shadow: 4px 0 25px rgba(0, 0, 0, 0.3);
        }

        .nav::before {
            content: '🏢🏬🏭🏪';
            position: absolute;
            bottom: -30px;
            left: -30px;
            font-size: 280px;
            opacity: 0.05;
            transform: rotate(10deg);
            white-space: nowrap;
            line-height: 1;
            pointer-events: none;
        }

        .nav::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #3498db, #9b59b6, #3498db);
            animation: borderFlow 3s linear infinite;
        }

        @keyframes borderFlow {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        .search {
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(52, 152, 219, 0.3);
            color: #fff;
            border-radius: 16px;
            padding: 16px 25px;
            font-size: 16px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            margin-bottom: 35px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            letter-spacing: 0.3px;
        }

        .search:focus {
            background: rgba(255, 255, 255, 0.12);
            border-color: #3498db;
            box-shadow: 0 0 30px rgba(52, 152, 219, 0.3);
            color: #fff;
            transform: translateY(-2px);
        }

        .search::placeholder {
            color: rgba(255, 255, 255, 0.5);
            font-weight: 300;
        }

        .filtr {
            margin: 30px 0 20px;
        }

        .filtr a {
            color: #fff;
            text-decoration: none;
            font-size: 18px;
            font-weight: 600;
            padding: 15px 30px;
            background: linear-gradient(135deg, #3498db, #9b59b6);
            border-radius: 16px;
            display: inline-block;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            letter-spacing: 0.5px;
            width: 100%;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .filtr a::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }

        .filtr a:hover::before {
            left: 100%;
        }

        .filtr a:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(52, 152, 219, 0.4);
        }

        .filtr i {
            margin-right: 10px;
            color: rgba(255,255,255,0.9);
        }

        .day {
            display: flex;
            gap: 15px;
            margin: 40px 0 30px;
        }

        .day p {
            flex: 1;
            padding: 12px 5px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            text-align: center;
            font-size: 15px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .day p:first-child {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: #fff;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .day p:last-child {
            background: rgba(255, 255, 255, 0.05);
            color: #ecf0f1;
        }

        .day p:last-child:hover {
            background: rgba(52, 152, 219, 0.2);
            border-color: #3498db;
            transform: scale(1.02);
        }

        .day i {
            margin-right: 6px;
        }

        .object {
            margin-top: 40px;
        }

        .object p {
            margin: 12px 0;
        }

        .object a {
            color: #bdc3c7;
            text-decoration: none;
            font-size: 18px;
            padding: 12px 20px;
            border-radius: 12px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .object a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #3498db, #9b59b6);
            transition: width 0.3s ease;
        }

        .object a:hover::after {
            width: 100%;
        }

        .object a:hover {
            background: rgba(52, 152, 219, 0.1);
            border-color: rgba(52, 152, 219, 0.3);
            transform: translateX(8px);
            color: #fff;
        }

        .object i {
            font-size: 22px;
            width: 30px;
            color: #3498db;
            filter: drop-shadow(0 2px 3px rgba(0,0,0,0.2));
        }

        /* Хедер - городской стиль */
        .header {
            background: linear-gradient(145deg, #2c3e50, #3498db, #9b59b6);
            background-size: 200% 200%;
            animation: cityGradient 8s ease infinite;
            border: none;
            padding: 35px 50px;
            position: relative;
            overflow: hidden;
        }

        @keyframes cityGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .header::before {
            content: '🏙️🌆🌃🏙️';
            position: absolute;
            bottom: -20px;
            right: 20px;
            font-size: 140px;
            opacity: 0.15;
            transform: skewX(-10deg);
            white-space: nowrap;
            animation: cityMove 20s linear infinite;
        }

        @keyframes cityMove {
            from { right: -100px; }
            to { right: 100%; }
        }

        .header::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(90deg, transparent, transparent 30px, rgba(255,255,255,0.05) 30px, rgba(255,255,255,0.05) 60px);
            pointer-events: none;
        }

        .live {
            font-size: 52px;
            font-weight: 800;
            color: #fff;
            text-shadow: 3px 3px 0 rgba(0,0,0,0.2), 6px 6px 0 rgba(52,152,219,0.3);
            margin: 0 0 5px;
            letter-spacing: 1px;
            position: relative;
            z-index: 1;
            display: inline-block;
        }

        .header h2 {
            color: #fff;
            font-size: 32px;
            margin: 15px 0 0;
            position: relative;
            z-index: 1;
            display: inline-flex;
            align-items: center;
            gap: 15px;
            text-shadow: 2px 2px 3px rgba(0,0,0,0.3);
            background: rgba(0, 0, 0, 0.2);
            padding: 10px 30px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .header h2::before {
            content: '🏠';
            font-size: 35px;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.3));
        }

        .header h2::after {
            content: '| ' + attr(data-count) + ' предложений';
            font-size: 16px;
            font-weight: 400;
            color: rgba(255,255,255,0.9);
            margin-left: 10px;
            padding-left: 15px;
            border-left: 2px solid rgba(255,255,255,0.3);
        }

        /* Каталог квартир */
        .catalog {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 35px;
            padding: 50px;
            background: #f8fafc;
            background-image: radial-gradient(circle at 20% 30%, rgba(52,152,219,0.05) 0%, transparent 30%);
        }

        .catalog > div {
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            cursor: pointer;
            border: 1px solid rgba(52, 152, 219, 0.1);
        }

        .catalog > div:hover {
            transform: translateY(-15px) scale(1.02);
            box-shadow: 0 30px 50px -15px #3498db;
            border-color: #3498db;
        }

        .catalog > div::before {
            content: '🏢';
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 50px;
            opacity: 0;
            transform: rotate(10deg) scale(0.5);
            transition: all 0.4s ease;
            z-index: 2;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
            pointer-events: none;
        }

        .catalog > div:hover::before {
            opacity: 0.15;
            transform: rotate(0deg) scale(1);
        }

        .catalog > div::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #3498db, #9b59b6);
            transform: scaleX(0);
            transition: transform 0.4s ease;
            transform-origin: left;
        }

        .catalog > div:hover::after {
            transform: scaleX(1);
        }

        .catalog img {
            width: 100%;
            height: 260px;
            object-fit: cover;
            transition: all 0.6s ease;
            border-bottom: 4px solid transparent;
        }

        .catalog > div:hover img {
            transform: scale(1.1);
        }

        .catalog h2 {
            font-size: 26px;
            font-weight: 700;
            margin: 25px 25px 15px;
            color: #1e293b;
            position: relative;
            padding-bottom: 12px;
            line-height: 1.3;
        }

        .catalog h2::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #3498db, #9b59b6);
            border-radius: 2px;
            transition: width 0.4s ease;
        }

        .catalog > div:hover h2::after {
            width: 120px;
        }

        .price {
            padding: 0 25px 30px;
            font-size: 34px;
            font-weight: 800;
            color: #1e293b;
            display: flex;
            align-items: baseline;
            gap: 8px;
            flex-wrap: wrap;
        }

        .price::before {
            content: '₽';
            font-size: 26px;
            color: #64748b;
            font-weight: 500;
        }

        .price::after {
            content: 'в месяц';
            font-size: 16px;
            color: #64748b;
            font-weight: 400;
            background: #f1f5f9;
            padding: 4px 15px;
            border-radius: 40px;
            margin-left: 10px;
        }

        /* Футер */
        .footer {
            grid-column: span 2;
            background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%);
            border: none;
            padding: 25px 50px;
            position: relative;
            overflow: hidden;
        }

        .footer::before {
            content: '📱💻📞📧';
            position: absolute;
            top: -20px;
            right: 20px;
            font-size: 100px;
            opacity: 0.1;
            transform: rotate(10deg);
            animation: float 6s ease infinite;
        }

        @keyframes float {
            0%, 100% { transform: rotate(10deg) translateY(0); }
            50% { transform: rotate(10deg) translateY(-15px); }
        }

        .svyaz {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #cbd5e1;
            position: relative;
            z-index: 1;
        }

        .svyaz p {
            margin: 0;
            font-size: 19px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s ease;
            padding: 12px 35px;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(52, 152, 219, 0.2);
            backdrop-filter: blur(5px);
        }

        .svyaz p:hover {
            background: rgba(52, 152, 219, 0.1);
            color: #fff;
            transform: translateY(-3px);
            border-color: #3498db;
            box-shadow: 0 10px 20px rgba(52, 152, 219, 0.2);
        }

        .svyaz i {
            font-size: 22px;
            color: #3498db;
            filter: drop-shadow(0 2px 3px rgba(0,0,0,0.2));
        }

        /* Адаптивность */
        @media (max-width: 1200px) {
            .main {
                grid-template-columns: 260px 1fr;
            }
            
            .catalog {
                grid-template-columns: repeat(2, 1fr);
                padding: 40px;
                gap: 30px;
            }
            
            .live {
                font-size: 44px;
            }
        }

        @media (max-width: 992px) {
            .main {
                grid-template-columns: 1fr;
                grid-template-rows: auto auto 1fr auto;
            }
            
            .nav {
                grid-row: auto;
            }
            
            .footer {
                grid-column: auto;
            }
            
            .catalog {
                grid-template-columns: 1fr;
                padding: 35px;
            }
            
            .header {
                padding: 30px;
            }
            
            .live {
                font-size: 40px;
            }
            
            .header h2 {
                font-size: 28px;
                flex-wrap: wrap;
            }
            
            .header h2::after {
                display: none;
            }
            
            .svyaz {
                flex-direction: column;
                gap: 20px;
                align-items: stretch;
            }
            
            .svyaz p {
                justify-content: center;
            }
        }

        @media (max-width: 576px) {
            body {
                padding: 10px;
            }
            
            .main {
                border-radius: 30px;
            }
            
            .catalog {
                padding: 25px;
                gap: 25px;
            }
            
            .price {
                font-size: 28px;
            }
            
            .price::after {
                margin-left: 0;
                width: 100%;
            }
        }

        /* Анимация для карточек */
        @keyframes slideUp {
            0% {
                opacity: 0;
                transform: translateY(40px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .catalog > div {
            animation: slideUp 0.5s ease forwards;
            opacity: 0;
        }

        .catalog > div:nth-child(2) { animation-delay: 0.1s; }
        .catalog > div:nth-child(3) { animation-delay: 0.2s; }
        .catalog > div:nth-child(4) { animation-delay: 0.3s; }
        .catalog > div:nth-child(5) { animation-delay: 0.4s; }
        .catalog > div:nth-child(6) { animation-delay: 0.5s; }
        .catalog > div:nth-child(7) { animation-delay: 0.6s; }
        .catalog > div:nth-child(8) { animation-delay: 0.7s; }

        /* Кастомный скроллбар */
        ::-webkit-scrollbar {
            width: 12px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #3498db, #9b59b6);
            border-radius: 10px;
            border: 3px solid #f1f5f9;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #2980b9, #8e44ad);
        }

        /* Исправление для изображения */
        .catalog img {
            content: url('https://mir-s3-cdn-cf.behance.net/project_modules/2800_opt_1/1bb62b173688629.6494486213c8f.jpg');
        }
    </style>
</head>
<body>
    <div class="main">
        <!-- Левая навигация -->
        <div class="item nav">
            <input class="form-control search" list="datalistOptions" id="exampleDataList" placeholder="🔍 Поиск квартир...">
            <datalist id="datalistOptions">
                <option value="1-комнатные">
                <option value="2-комнатные">
                <option value="3-комнатные">
                <option value="Студии">
                <option value="Пентхаусы">
                <option value="Апартаменты">
                <option value="Элитные">
                <option value="Новостройки">
            </datalist> 
            
            <div class="filtr">
                <a href="/filtr"><i class="bi bi-sliders2"></i> Фильтр</a>
            </div>
            
            <div class="day">
                <p><i class="bi bi-calendar-check"></i> Ежемесячно</p>
                <p><i class="bi bi-calendar-week"></i> Посуточно</p>
            </div>
            
            <div class="object">
                <p><a href="/"><i class="bi bi-house-door"></i> Главная</a></p>
                <p><a href="/hometype/"><i class="bi bi-building"></i> Дома</a></p>
                <p><a href="/garagestype/"><i class="bi bi-car-front"></i> Гаражи</a></p>
                <p><a href="/apartamenttype/"><i class="bi bi-building"></i> Квартиры</a></p>
                <p><a href="/plottype/"><i class="bi bi-tree"></i> Участки</a></p>
                <p><a href="/othertype/"><i class="bi bi-grid-3x3-gap-fill"></i> Прочее</a></p>
            </div>
        </div>

        <!-- Хедер -->
        <div class="item header">
            <h1 class="live">Жилье победы</h1>
            <h2>Квартиры в городе</h2>
        </div>

        <!-- Каталог квартир -->
        <div class="catalog">
            {% for obj in objects %}
            <div>
                <img alt="Квартира" onerror="this.src='https://via.placeholder.com/400x300/3498db/ffffff?text=Квартира'">
                <h2>{{ obj[1] }}</h2>
                <div class="price">{{ obj[4] }}</div>
            </div>
            {% endfor %}
        </div>

        <!-- Футер -->
        <div class="item footer">
            <div class="svyaz">
                <p><i class="bi bi-telephone"></i> 8 (977) 787-77-77</p>
                <p><i class="bi bi-envelope"></i> flats.victory@mail.ru</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
