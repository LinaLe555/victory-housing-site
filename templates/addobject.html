<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добавить объект | Жилье победы</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        .page-title {
            text-align: center;
            color: #fff;
            margin-bottom: 40px;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            font-size: 2.5rem;
        }

        .page-title i {
            margin-right: 10px;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.2));
        }

        .forms-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
        }

        .form-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 35px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .form-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 35px 60px -15px rgba(0, 0, 0, 0.6);
        }

        .form-card h2 {
            color: #2c3e50;
            font-size: 28px;
            margin-bottom: 25px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 15px;
        }

        .form-card h2 i {
            color: #667eea;
            font-size: 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #34495e;
            font-size: 16px;
        }

        .form-group label i {
            margin-right: 8px;
            color: #667eea;
        }

        .form-control, .form-select {
            width: 100%;
            padding: 12px 18px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            transition: all 0.3s ease;
            background: white;
        }

        .form-control:focus, .form-select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
            outline: none;
        }

        .form-control::placeholder {
            color: #b0b0b0;
            font-style: italic;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            padding: 14px 30px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 50px;
            width: 100%;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(102, 126, 234, 0.5);
            background: linear-gradient(135deg, #5a6fd8, #6a3f9c);
        }

        .btn-primary i {
            font-size: 20px;
        }

        /* Адаптивность */
        @media (max-width: 992px) {
            .forms-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            
            .page-title {
                font-size: 2rem;
            }
        }

        @media (max-width: 576px) {
            body {
                padding: 10px;
            }
            
            .form-card {
                padding: 25px;
            }
            
            .form-card h2 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="page-title">
            <i class="bi bi-plus-circle"></i> 
            Добавление объектов
        </h1>
        
        <div class="forms-grid">
            <!-- Форма создания нового объекта -->
            <div class="form-card">
                <h2>
                    <i class="bi bi-building"></i>
                    Новый объект
                </h2>
                <form action="/addobject/" method="post">
                    <div class="form-group">
                        <label for="name">
                            <i class="bi bi-tag"></i> Название объекта
                        </label>
                        <input type="text" class="form-control" id="name" name="name" 
                               placeholder="Например: Уютная квартира в центре" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="description">
                            <i class="bi bi-card-text"></i> Описание
                        </label>
                        <input type="text" class="form-control" id="description" name="description" 
                               placeholder="Краткое описание объекта" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="employe">
                            <i class="bi bi-person-badge"></i> Ответственный сотрудник
                        </label>
                        <select class="form-select" id="employe" name="employe" required>
                            {% if employees %}
                                {% for employe in employees %}
                                    <option value="{{ employe[0] }}">{{ employe[1] }}</option>
                                {% endfor %}
                            {% else %}
                                <option value="" disabled selected>Нет доступных сотрудников</option>
                            {% endif %}
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="type">
                            <i class="bi bi-grid"></i> Тип объекта
                        </label>
                        <select class="form-select" id="type" name="type" required>
                            {% if type_object %}
                                {% for type in type_object %}
                                    <option value="{{ type[0] }}">{{ type[1] }}</option>
                                {% endfor %}
                            {% else %}
                                <option value="" disabled selected>Нет доступных типов</option>
                            {% endif %}
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="price">
                            <i class="bi bi-currency-ruble"></i> Цена
                        </label>
                        <input type="number" class="form-control" id="price" name="price" 
                               placeholder="Сумма в рублях" min="0" step="100" required>
                    </div>
                    
                    <button type="submit" class="btn-primary">
                        <i class="bi bi-check2-circle"></i> Создать объект
                    </button>
                </form>
            </div>
            
            <!-- Форма создания нового типа объекта -->
            <div class="form-card">
                <h2>
                    <i class="bi bi-plus-square"></i>
                    Новый тип
                </h2>
                <form action="/addtype/" method="post">
                    <div class="form-group">
                        <label for="type_name">
                            <i class="bi bi-pencil"></i> Название типа
                        </label>
                        <input type="text" class="form-control" id="type_name" name="name" 
                               placeholder="Например: Пентхаус, Офис, Склад" required>
                    </div>
                    
                    <button type="submit" class="btn-primary">
                        <i class="bi bi-plus-lg"></i> Добавить тип
                    </button>
                </form>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap JS (для адаптивного меню, но не обязательно) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
